<style type="text/css">
	body {

	.parent {

		text-align: center;
		color: white;
	}
	h1 {

	}
</style>

	<header class="parent">
		<hgroup class="child">
			<h1>
				<abbr title="User Experience">UX</abbr>/<abbr title="User Interface">UI</abbr>

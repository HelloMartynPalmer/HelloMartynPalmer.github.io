    <body class="loader--active">
        <style>
            .no-js .loader--active {/*display: none;*/}
            .loader--active {overflow: hidden;}
            .loader--active #loader {position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999;}
            .loader--active .loading--layer{ 
                left:-35vw; transition: left 1s ease-in-out;
            }
            .loading--layer{
            position: absolute; top: 0; left:135vw; height: 100%; width: 170%; 
                -ms-transform: skewX(20deg);
                -webkit-transform: skewX(20deg);
                transform: skewX(20deg);
                transition: left 1s ease-in-out;}
            .loading--layer:nth-child(1){ background: #ddd; z-index: 1;}
            .loading--layer:nth-child(2){ background: #ccc; z-index: 2;}
            .loading--layer:nth-child(1){
                -webkit-transition-delay: 1.5s;
                -moz-transition-delay: 1.5s;
                -o-transition-delay: 1.5s;
                transition-delay: 1.5s;}
            .loading--layer:nth-child(2){
                -webkit-transition-delay: 1s;
                -moz-transition-delay: 1s;
                -o-transition-delay: 1s;
                transition-delay: 1s;}
        </style>
